name: build-and-test
run-name: Build and test across multiple operating systems, architectures and Bazel versions.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions:
  contents: read
  actions: read
  checks: write
jobs:
  checkout-setup-build-test: 
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version: [10, 12, 14]
        os:
          - macos-26-intel
          - macos-26
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - windows-11
          - windows-11-arm
        bazel:
          - 7.x
          - 8.x
          - 9.x
        rmw:
          - rmw_fastrtps_cpp
          - rmw_zenoh_cpp
          - rmw_cyclonedds_cpp
    steps:

    # Remove unnecessary files to maximize build space.
    - name: Free disk space
      uses: jlumbroso/free-disk-space@v1.3.1
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    # Install valgrind
    - name: Install Valgrind
      run: sudo apt update && sudo apt install valgrind

    # Checkout this repository and all submodules.
    - name: Checkout repository and submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # Setup bazel as a tool for building.
    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.15.0
      with:
        bazelisk-cache: true
        disk-cache: ${{ matrix.os }}-${{ matrix.bazel }}-${{ matrix.rmw }}
        repository-cache: false

    # Build the container image.
    - name: Build test container
      run: docker build -t ros-central-registry:24.04 .

    # Build the ROS examples.
    - name: Build code
      env:
        USE_BAZEL_VERSION: ${{ matrix.bazel }}
      run: bazel build --config=ci --@rmw_implementation//:rmw=${{ matrix.rmw }}

    # Test the distribution.
    - name: Run tests
      env:
        USE_BAZEL_VERSION: ${{ matrix.bazel }}
      run: bazel test --config=ci --@rmw_implementation//:rmw=${{ matrix.rmw }} --jobs 1

    # Summarize the results.
    - name: Test report
      uses: dorny/test-reporter@v2
      with:
        name: Bazel tests
        path: bazel-testlogs/**/test.xml
        reporter: java-junit
      if: always()

    # Upload test test logs
    - name: Upload test logs
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-${{ matrix.bazel }}-${{ matrix.rmw }} (test logs)
        path: "bazel-testlogs/**/test.log"
      if: always()

    # Create badges for each build
    - name: Update status badges
      uses: Schneegans/dynamic-badges-action@v1.7.0
      with:
        auth: ${{ secrets.STATUS_BADGE_SECRET }}
        gistID: 4d05b2382879fbd51f9a07bb7c63fb29
        filename: ${{ matrix.os }}-${{ matrix.bazel }}-${{ matrix.rmw }}.json
        label: ${{ matrix.bazel }}
        message: ${{ job.status == 'success' && '✓' || '✘' }}
        color: ${{ job.status == 'success' && 'green' || 'red' }}
      if: github.ref_name == 'main'
